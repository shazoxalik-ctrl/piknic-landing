<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="#1e5c22" stroke="#164a1a" stroke-width="3"/>
  <!-- Upper white/sky area -->
  <ellipse cx="100" cy="72" rx="95" ry="55" fill="#e8f5e0" clip-path="url(#circle-clip)"/>
  <!-- Sun -->
  <circle cx="100" cy="52" r="20" fill="#f5e878" opacity="0.95"/>
  <!-- Far left tree -->
  <polygon points="28,100 42,68 56,100" fill="#164a1a"/>
  <polygon points="32,96 42,72 52,96" fill="#2d7a33"/>
  <!-- Far right tree -->
  <polygon points="144,100 158,68 172,100" fill="#164a1a"/>
  <polygon points="148,96 158,72 168,96" fill="#2d7a33"/>
  <!-- Mid left tree -->
  <polygon points="52,100 64,72 76,100" fill="#1e5c22"/>
  <!-- Mid right tree -->
  <polygon points="124,100 136,72 148,100" fill="#1e5c22"/>
  <!-- Tent -->
  <polygon points="100,38 68,100 132,100" fill="#164a1a"/>
  <polygon points="100,38 100,100 132,100" fill="#1a5220" opacity="0.5"/>
  <!-- Tent door -->
  <ellipse cx="100" cy="96" rx="10" ry="12" fill="#e8f5e0" opacity="0.4"/>
  <!-- Tent pole top -->
  <line x1="95" y1="36" x2="105" y2="36" stroke="#164a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground / lower green half -->
  <rect x="5" y="100" width="190" height="95" fill="#1e5c22" clip-path="url(#circle-clip)"/>
  <!-- PIKNIC text -->
  <text x="100" y="142" text-anchor="middle" fill="white" font-family="'Arial Black', sans-serif" font-weight="900" font-size="30" letter-spacing="-0.5">PIKNIC</text>
  <!-- UZBEKISTAN text -->
  <text x="100" y="162" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif" font-weight="600" font-size="11" letter-spacing="3">UZBEKISTAN</text>
</svg>
